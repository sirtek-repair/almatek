<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlmaTek</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0e; --surface: #18181b; --surface2: #27272a;
      --border: #3f3f46; --text: #fafafa; --muted: #71717a;
      --accent: #3b82f6; --green: #10b981;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px 16px 60px; }
    .container { max-width: 460px; margin: 0 auto; }

    header { text-align: center; padding: 24px 0 28px; }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
    header p { color: var(--muted); font-size: 12px; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
    .header-links { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
    .hlink { display: inline-block; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 14px; color: var(--muted); font-size: 12px; font-weight: 600; text-decoration: none; letter-spacing: 0.03em; transition: all 0.15s; }
    .hlink:hover { border-color: #52525b; color: var(--text); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
    .field-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px; }
    select, input[type="number"], input[type="text"], input[type="email"], textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; color: var(--text); font-size: 16px; font-family: inherit; outline: none; appearance: none; -webkit-appearance: none; transition: border-color 0.15s; }
    select:focus, input:focus, textarea:focus { border-color: var(--accent); }
    select option { background: #27272a; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 7px; }
    .gap { margin-top: 14px; }

    .mode-tabs { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 3px; margin-bottom: 14px; }
    .mode-tab { flex: 1; padding: 9px; font-size: 13px; font-weight: 600; font-family: inherit; background: none; border: none; border-radius: 8px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .mode-tab.active { background: var(--accent); color: #fff; }

    .tier-row { display: flex; gap: 8px; margin-top: 12px; }
    .tier-btn { flex: 1; padding: 12px; font-size: 14px; font-weight: 600; font-family: inherit; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .tier-btn:hover:not(.active):not(:disabled) { border-color: #52525b; color: #d4d4d8; }
    .tier-btn.active { background: rgba(59,130,246,0.15); border-color: var(--accent); color: var(--text); }
    .tier-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .tier-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .stock-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 10px 12px; background: var(--surface2); border-radius: 10px; }
    .stock-row .stock-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
    .stock-row .stock-badge.in  { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
    .stock-row .stock-badge.low { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .stock-row .stock-badge.out { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .stock-row .stock-detail { font-size: 12px; color: var(--muted); }

    .model-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .model-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 8px; color: var(--muted); font-size: 12px; font-family: inherit; font-weight: 500; cursor: pointer; text-align: center; line-height: 1.5; transition: all 0.15s; }
    .model-btn strong { display: block; font-size: 15px; color: var(--text); margin-top: 4px; }
    .model-btn:hover:not(.active) { border-color: #52525b; color: #d4d4d8; }
    .model-btn.active { background: rgba(59,130,246,0.15); border-color: var(--accent); color: var(--text); }

    .quote-card { background: linear-gradient(145deg, #1e3a8a, #1d4ed8); border: 1px solid #2563eb; border-radius: 16px; padding: 28px 24px; text-align: center; margin-bottom: 12px; }
    .quote-card .ql { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
    .quote-card .qa { font-size: 64px; font-weight: 800; line-height: 1; letter-spacing: -0.03em; }
    .quote-card .qsub { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 8px; }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; margin-bottom: 12px; cursor: pointer; user-select: none; transition: border-color 0.15s; }
    .toggle-row:hover { border-color: #52525b; }
    .toggle-row.active { border-color: var(--accent); }
    .toggle-text .tl { font-size: 15px; font-weight: 600; }
    .toggle-text .ts { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .switch { width: 46px; height: 26px; background: var(--surface2); border: 1px solid var(--border); border-radius: 13px; position: relative; transition: background 0.2s, border-color 0.2s; flex-shrink: 0; }
    .switch.on { background: var(--accent); border-color: var(--accent); }
    .switch::after { content: ''; position: absolute; width: 20px; height: 20px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .switch.on::after { transform: translateX(20px); }

    .mobile-fee-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
    .miles-row { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
    .miles-row label { margin: 0; white-space: nowrap; flex-shrink: 0; }
    .miles-row input { flex: 1; }
    .fee-badge { background: rgba(59,130,246,0.12); border: 1px solid var(--accent); border-radius: 10px; padding: 10px 14px; margin-top: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .fee-badge span:last-child { font-weight: 700; font-size: 16px; color: var(--accent); }

    .deal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
    .deal-header { text-align: center; font-size: 12px; color: var(--muted); margin: 20px 0 12px; }
    .deal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .deal-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 12px; text-align: center; }
    .deal-box.win { background: rgba(16,185,129,0.1); border-color: var(--green); }
    .deal-box .dl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; }
    .deal-box.win .dl { color: rgba(16,185,129,0.8); }
    .deal-box .da { font-size: 30px; font-weight: 700; color: #52525b; }
    .deal-box.win .da { color: #fff; }
    .deal-box .ds { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .deal-box.win .ds { color: rgba(255,255,255,0.5); }
    .savings-row { text-align: center; margin-top: 14px; }
    .savings-pill { display: inline-block; background: rgba(16,185,129,0.15); border: 1px solid var(--green); color: var(--green); font-size: 13px; font-weight: 700; padding: 6px 18px; border-radius: 100px; }

    .tab-bar { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 4px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 10px; font-size: 14px; font-weight: 600; font-family: inherit; background: none; border: none; border-radius: 10px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .tab-btn.active { background: var(--accent); color: #fff; }

    .inv-search { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 15px; font-family: inherit; outline: none; margin-bottom: 12px; }
    .inv-search:focus { border-color: var(--accent); }
    .inv-search::placeholder { color: var(--muted); }
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 600; font-family: inherit; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .filter-btn.active { background: rgba(59,130,246,0.15); border-color: var(--accent); color: var(--text); }
    .inv-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; }
    .inv-item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .inv-item-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
    .inv-item-model { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .stock-badge { font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .stock-badge.in  { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
    .stock-badge.low { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .stock-badge.out { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .inv-item-meta { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .inv-actions { display: flex; gap: 8px; margin-top: 12px; }
    .inv-btn { flex: 1; padding: 9px; font-size: 13px; font-weight: 600; font-family: inherit; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text); transition: all 0.15s; }
    .inv-btn.receive { border-color: var(--accent); color: var(--accent); }
    .inv-btn.used    { border-color: var(--green); color: var(--green); }
    .inv-btn.remove  { border-color: #7c3aed; color: #a78bfa; background: rgba(139,92,246,0.08); }
    .inv-btn:hover   { opacity: 0.8; }
    
    .orders-section  { margin-top: 20px; }
    .orders-header   { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .orders-header-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
    .orders-new-btn  { padding: 7px 14px; font-size: 12px; font-weight: 700; font-family: inherit; background: rgba(59,130,246,0.12); border: 1px solid var(--accent); color: var(--accent); border-radius: 8px; cursor: pointer; }
    .order-item      { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; }
    .order-item-top  { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .order-item-name { font-size: 13px; font-weight: 600; }
    .order-item-meta { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
    .order-status    { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .order-status.pending  { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .order-status.received { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
    .order-form      { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 14px; }
    .order-form select, .order-form input[type="number"], .order-form input[type="text"] { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; margin-bottom: 8px; appearance: none; -webkit-appearance: none; }
    .order-form select:focus, .order-form input:focus { border-color: var(--accent); }
    .order-form select option { background: #27272a; }
    .order-form-btns { display: flex; gap: 8px; }
    .order-form-btns button { flex: 1; padding: 9px; font-size: 13px; font-weight: 700; font-family: inherit; border-radius: 8px; cursor: pointer; border: none; background: var(--accent); color: #fff; }
    .order-form-btns .cancel-btn { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .inv-inline { margin-top: 10px; display: flex; gap: 8px; align-items: center; }
    .inv-inline input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 15px; font-family: inherit; outline: none; }
    .inv-inline input:focus { border-color: var(--accent); }
    .inv-inline button { padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; border: none; background: var(--accent); color: #fff; }
    .inv-inline .cancel-btn { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .inv-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #18181b; border: 1px solid var(--green); color: var(--green); font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 100px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .inv-toast.show { opacity: 1; }
    .token-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    .token-card p { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
    .token-row { display: flex; gap: 8px; }
    .token-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
    .token-row input:focus { border-color: var(--accent); }
    .token-row button { padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; border: none; background: var(--accent); color: #fff; }
    .loading-msg { text-align: center; color: var(--muted); font-size: 14px; padding: 40px 0; }
    .hidden { display: none !important; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    
    .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
    .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px 28px; max-width: 320px; width: 90%; text-align: center; }
    .auth-box h2 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .auth-box p { color: var(--muted); font-size: 13px; margin-bottom: 20px; line-height: 1.5; }
    .auth-box input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; color: var(--text); font-size: 16px; font-family: inherit; outline: none; text-align: center; letter-spacing: 0.12em; margin-bottom: 12px; }
    .auth-box input:focus { border-color: var(--accent); }
    .auth-box .auth-submit { width: 100%; padding: 13px; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; border: none; background: var(--accent); color: #fff; }
    .auth-error { color: #ef4444; font-size: 13px; margin-top: 8px; min-height: 18px; }
    .auth-dismiss { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; margin-top: 12px; font-family: inherit; text-decoration: underline; }
    .demo-badge { background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.35); color: #fbbf24; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-family: inherit; }
    .staff-badge { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.35); color: var(--green); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-family: inherit; }
    .demo-price { font-style: italic; }
    .demo-inv-note { text-align: center; color: #fbbf24; font-size: 12px; padding: 8px 0 4px; font-weight: 600; letter-spacing: 0.02em; }

    .orders-tab-nav { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
    .orders-tab-btn { padding: 8px 12px; font-size: 12px; font-weight: 600; font-family: inherit; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .orders-tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .orders-view { display: none; }
    .orders-view.active { display: block; }
    .orders-items-list { display: flex; flex-direction: column; gap: 10px; }
    .orders-empty-state { color: var(--muted); text-align: center; padding: 30px 20px; }
    .order-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .order-item-info { flex: 1; }
    .order-item-qty { display: flex; align-items: center; gap: 4px; }
    .order-item-qty input { width: 50px; padding: 4px 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; font-family: inherit; text-align: center; }
    .order-item-btn { padding: 8px 12px; background: var(--accent); color: white; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: inherit; }
    .order-item-btn:hover { opacity: 0.9; }
    .order-item-btn.remove { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .order-item-btn.receive { background: var(--green); }
    .order-partial-notice { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.3); border-radius: 8px; padding: 10px 12px; margin-top: 8px; font-size: 12px; color: #fbbf24; }
    
    .need-sub-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
    .need-sub-btn { flex: 1; padding: 7px 8px; font-size: 12px; font-weight: 600; font-family: inherit; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; text-align: center; }
    .need-sub-btn.active { background: rgba(59,130,246,0.15); border-color: var(--accent); color: var(--text); }
    
    .tier-options { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .tier-option { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: all 0.15s; }
    .tier-option:hover { border-color: #52525b; }
    .tier-option.active { background: rgba(59,130,246,0.15); border-color: var(--accent); }
    .tier-option.na { opacity: 0.3; pointer-events: none; }
    .tier-option-header { display: flex; justify-content: space-between; align-items: center; }
    .tier-option-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .tier-option.active .tier-option-label { color: rgba(147,197,253,0.9); }
    .tier-option-price { font-size: 20px; font-weight: 700; color: var(--text); }
    .tier-option .stock-row { margin-top: 8px; padding: 7px 10px; }
    
    .hlink-copied { background: rgba(16,185,129,0.15) !important; border-color: var(--green) !important; color: var(--green) !important; }
    .receive-alert { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.4); border-radius: 10px; padding: 12px 14px; margin-top: 10px; font-size: 13px; color: #ef4444; line-height: 1.5; }
    .receive-alert strong { display: block; font-size: 14px; margin-bottom: 4px; }
    
    .hlink-dropdown { position: relative; }
    .hlink-dropdown-menu { position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%); z-index: 200; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 6px; display: flex; flex-direction: column; gap: 4px; min-width: 170px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .hlink-dropdown-menu .hlink { display: block; text-align: left; }
    
    .owner-badge { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: #a78bfa; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-family: inherit; }
    
    .booker-model-tag { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px; }
    .booker-model-tag.m1 { background: rgba(59,130,246,0.15); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); }
    .booker-model-tag.m2 { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
    .booker-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .booker-row:last-child { border-bottom: none; }
    .booker-row .bl { color: var(--muted); }
    .booker-row .bv { font-weight: 700; }
    .booker-total { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); border-radius: 12px; padding: 16px; margin: 12px 0; text-align: center; }
